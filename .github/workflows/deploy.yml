name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write  # OIDC — no long-lived AWS keys in secrets
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ── Backend: build + push each Flask service to ECR ────────────────────────
  backend:
    name: Build backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing, order, payment]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/memesy-prod/${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -f backend/${{ matrix.service }}/Dockerfile \
            -t $IMAGE:$SHA \
            -t $IMAGE:latest \
            backend/
          docker push $IMAGE:$SHA
          docker push $IMAGE:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --service memesy-prod-${{ matrix.service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  # ── Lambda: package + upload to S3, update function ─────────────────────────
  lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install deps into package dir
        run: |
          pip install \
            -r backend/lambda/requirements.txt \
            --target backend/lambda/package \
            --platform manylinux2014_x86_64 \
            --only-binary=:all:

      - name: Zip package
        run: |
          cp backend/lambda/handler.py backend/lambda/package/
          cd backend/lambda/package
          zip -r ../../../purchase-handler.zip .

      - name: Upload to S3
        run: |
          aws s3 cp purchase-handler.zip \
            s3://${{ secrets.LAMBDA_PACKAGE_BUCKET }}/purchase-handler/latest.zip

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name memesy-prod-purchase-handler \
            --s3-bucket ${{ secrets.LAMBDA_PACKAGE_BUCKET }} \
            --s3-key purchase-handler/latest.zip \
            --region ${{ env.AWS_REGION }}

  # ── Frontend: build React SPA, sync to S3, invalidate CloudFront ─────────────
  frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          # Hashed assets: long-lived cache
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html: never cache (entry point for SPA)
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_FRONTEND_DIST_ID }} \
            --paths "/*"
