name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  frontend:
    name: Deploy frontend → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        run: |
          # Hashed assets: long-lived cache
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html: never cache (SPA entry point)
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_FRONTEND_DIST_ID }} \
            --paths "/*"
