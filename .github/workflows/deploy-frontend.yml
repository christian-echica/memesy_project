name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ── Validate branch vs environment ─────────────────────────────────────────
  determine-environment:
    name: Determine Deployment Target
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Validate branch / environment pairing
        id: set-env
        run: |
          BRANCH="${{ inputs.branch }}"
          ENV="${{ inputs.environment }}"

          if [ "$ENV" = "production" ] && [ "$BRANCH" != "main" ]; then
            echo "Production deploys must come from main branch (got: $BRANCH)"
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Target: $ENV from branch $BRANCH"

  # ── Build & Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy frontend → ${{ needs.determine-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify dist exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "dist/ not found — build failed"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          role-session-name: github-actions-frontend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 — hashed assets (long cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ vars.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      - name: Sync to S3 — index.html (no cache)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ vars.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_FRONTEND_DIST_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Deployed to: ${{ needs.determine-environment.outputs.environment }}"
          echo "Branch:      ${{ inputs.branch }}"
          echo "S3 bucket:   ${{ vars.S3_FRONTEND_BUCKET }}"
